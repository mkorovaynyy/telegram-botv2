databaseChangeLog:
  - changeSet:
      id: 1
      author: your_name
      changes:
        - createTable:
            tableName: notification_task
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: notification_datetime
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false

        - createIndex:
            tableName: notification_task
            indexName: idx_notification_datetime
            columns:
              - name: notification_datetime